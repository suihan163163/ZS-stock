<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>重置密码 | WZSP</title>
  <link rel="stylesheet" href="./tailwind.css" />
  <style>
    .reset-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 50%, #cbd5e1 100%);
      padding: 24px;
    }
    .reset-card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.04);
      padding: 40px 32px;
      text-align: center;
    }
    .reset-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(11,60,106,.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .reset-card h1 { font-size: 22px; font-weight: 800; margin: 0 0 8px; color: var(--text); }
    .reset-card .reset-sub { font-size: 13px; color: var(--muted); line-height: 1.5; margin: 0 0 28px; }
    .reset-card .field { text-align: left; margin-top: 16px; }
    .reset-card .btn-reset {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      border: none;
      border-radius: 10px;
      background: var(--brand-blue);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all .15s;
    }
    .reset-card .btn-reset:hover { background: #0a3358; transform: translateY(-1px); }
    .reset-card .btn-reset:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .reset-msg {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .reset-msg.error { background: rgba(211,47,47,.04); color: var(--brand-red); border: 1px solid rgba(211,47,47,.1); }
    .reset-msg.success { background: rgba(5,150,105,.04); color: #059669; border: 1px solid rgba(5,150,105,.1); }
    .reset-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      color: var(--brand-blue);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }
    .reset-back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="reset-page">
    <div class="reset-card" id="resetForm">
      <div class="reset-icon">
        <svg class="inline-icon" style="width:28px;height:28px;color:var(--brand-blue);" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1>Reset Your Password</h1>
      <p class="reset-sub">Please enter your new password below.</p>
      <div class="field">
        <label for="newPassword">New Password</label>
        <div class="password-wrapper">
          <input id="newPassword" type="password" placeholder="Enter new password (min. 6 characters)" autocomplete="new-password" />
          <button type="button" class="password-toggle" aria-label="Toggle password visibility">
            <svg class="inline-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-wrapper">
          <input id="confirmPassword" type="password" placeholder="Confirm new password" autocomplete="new-password" />
          <button type="button" class="password-toggle" aria-label="Toggle password visibility">
            <svg class="inline-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="resetMsg" class="reset-msg"></div>
      <button id="submitReset" class="btn-reset" type="button">
        <svg class="inline-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Reset Password
      </button>
      <a class="reset-back" href="index.html">
        <svg class="inline-icon" style="width:14px;height:14px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> Back to Home
      </a>
    </div>
    <div class="reset-card" id="successView" style="display:none;">
      <div class="reset-icon" style="background:rgba(5,150,105,.08);">
        <svg class="inline-icon" style="width:28px;height:28px;color:#059669;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <h1>Password Reset Successful</h1>
      <p class="reset-sub">Your password has been updated. You can now log in with your new password.</p>
      <a class="reset-back" href="index.html" style="font-size:15px;padding:12px 32px;background:var(--brand-blue);color:#fff;border-radius:10px;text-decoration:none;">
        <svg class="inline-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg> Go to Login
      </a>
    </div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      if (!token) {
        document.getElementById('resetMsg').className = 'reset-msg error';
        document.getElementById('resetMsg').textContent = 'Invalid reset link. Please request a new one from the login page.';
        document.getElementById('resetMsg').style.display = 'block';
        document.getElementById('submitReset').disabled = true;
        return;
      }

      document.querySelectorAll('.password-toggle').forEach(function(toggle) {
        toggle.addEventListener('click', function() {
          var wrapper = this.closest('.password-wrapper');
          var input = wrapper ? wrapper.querySelector('input') : null;
          if (!input) return;
          if (input.type === 'password') { input.type = 'text'; this.innerHTML = '<svg class="inline-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>'; }
          else { input.type = 'password'; this.innerHTML = '<svg class="inline-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>'; }
        });
      });

      var msgEl = document.getElementById('resetMsg');
      var submitBtn = document.getElementById('submitReset');

      submitBtn.addEventListener('click', function() {
        msgEl.style.display = 'none'; msgEl.textContent = '';
        var newPwd = document.getElementById('newPassword').value;
        var confirmPwd = document.getElementById('confirmPassword').value;
        if (!newPwd) { msgEl.className = 'reset-msg error'; msgEl.textContent = 'Please enter a new password.'; msgEl.style.display = 'block'; return; }
        if (newPwd.length < 6) { msgEl.className = 'reset-msg error'; msgEl.textContent = 'Password must be at least 6 characters.'; msgEl.style.display = 'block'; return; }
        if (newPwd !== confirmPwd) { msgEl.className = 'reset-msg error'; msgEl.textContent = 'Passwords do not match.'; msgEl.style.display = 'block'; return; }

        submitBtn.disabled = true; submitBtn.innerHTML = '<svg class="inline-icon" style="animation: spin 1s linear infinite;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Resetting...';

        fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, newPassword: newPwd })
        }).then(function(res) { return res.json(); }).then(function(data) {
          if (data.success) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('successView').style.display = '';
          } else {
            msgEl.className = 'reset-msg error'; msgEl.textContent = data.message || 'Reset failed.'; msgEl.style.display = 'block';
            submitBtn.disabled = false; submitBtn.innerHTML = '<svg class="inline-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Reset Password';
          }
        }).catch(function() {
          msgEl.className = 'reset-msg error'; msgEl.textContent = 'Network error. Please try again.'; msgEl.style.display = 'block';
          submitBtn.disabled = false; submitBtn.innerHTML = '<svg class="inline-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Reset Password';
        });
      });
    })();
  </script>
</body>
</html>
